<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <!-- Gold gradient for outer ring -->
    <linearGradient id="goldRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#793700"/>
      <stop offset="24.2%" stop-color="#f3a200"/>
      <stop offset="49.7%" stop-color="#fff78e"/>
      <stop offset="72.1%" stop-color="#f3a200"/>
      <stop offset="100%" stop-color="#793700"/>
    </linearGradient>
    <!-- Radial gradient for inner gold disc -->
    <radialGradient id="goldDisc" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="30%" stop-color="#ffd54f"/>
      <stop offset="60%" stop-color="#f9a825"/>
      <stop offset="85%" stop-color="#e65100"/>
      <stop offset="100%" stop-color="#793700"/>
    </radialGradient>
    <!-- Red band gradient -->
    <linearGradient id="redBand" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b71c1c"/>
      <stop offset="50%" stop-color="#c62828"/>
      <stop offset="100%" stop-color="#b71c1c"/>
    </linearGradient>
    <!-- Curved text paths -->
    <path id="topCurve" d="M 55,150 A 95,95 0 0,1 245,150"/>
    <path id="bottomCurve" d="M 80,205 A 80,80 0 0,0 220,205"/>
  </defs>

  <!-- Outer gold ring / border -->
  <circle cx="150" cy="150" r="148" fill="url(#goldRing)" stroke="#8B6914" stroke-width="1"/>

  <!-- Dark inner ring edge -->
  <circle cx="150" cy="150" r="132" fill="#793700"/>

  <!-- Red band ring -->
  <circle cx="150" cy="150" r="130" fill="url(#redBand)"/>

  <!-- Inner gold disc -->
  <circle cx="150" cy="150" r="95" fill="url(#goldDisc)"/>

  <!-- Gold ring border between red and disc -->
  <circle cx="150" cy="150" r="95" fill="none" stroke="url(#goldRing)" stroke-width="4"/>
  <circle cx="150" cy="150" r="130" fill="none" stroke="url(#goldRing)" stroke-width="5"/>
  <circle cx="150" cy="150" r="135" fill="none" stroke="#b8970a" stroke-width="2"/>
  <circle cx="150" cy="150" r="148" fill="none" stroke="#b8970a" stroke-width="2"/>

  <!-- White dots on sides of red band -->
  <circle cx="44" cy="150" r="5" fill="white"/>
  <circle cx="256" cy="150" r="5" fill="white"/>

  <!-- Highlight on gold disc -->
  <ellipse cx="130" cy="115" rx="32" ry="20" fill="rgba(255,255,255,0.25)" transform="rotate(-25,130,115)"/>

  <!-- TOP TEXT: KK MUTTON curved along top of red band -->
  <text font-family="Impact, 'Arial Black', sans-serif" font-size="19" font-weight="bold" fill="white" letter-spacing="2.5" text-anchor="middle">
    <textPath xlink:href="#topCurve" startOffset="50%">KK MUTTON</textPath>
  </text>

  <!-- BOTTOM TEXT: STALL curved along bottom of red band -->
  <text font-family="Impact, 'Arial Black', sans-serif" font-size="19" font-weight="bold" fill="white" letter-spacing="3" text-anchor="middle">
    <textPath xlink:href="#bottomCurve" startOffset="50%">STALL</textPath>
  </text>
</svg>
